<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <link rel="stylesheet" href="https://ssl.gstatic.com/docs/script/css/add-ons1.css">
    <style>
      body { padding: 12px; font-family: 'Roboto', sans-serif; }
      .card { 
        background: #f8f9fa; 
        border: 1px solid #dadce0; 
        border-radius: 6px; 
        padding: 16px; 
        margin-bottom: 20px; 
      }
      h3 { margin-top: 0; color: #1a73e8; font-size: 14px; font-weight: 600; }
      .help-text { font-size: 11px; color: #5f6368; margin-bottom: 12px; line-height: 1.4; }
      .form-group { margin-bottom: 12px; }
      label { display: block; font-weight: bold; margin-bottom: 4px; font-size: 11px; color: #3c4043; }
      select, input[type="text"] { width: 100%; box-sizing: border-box; height: 30px; }
      .radio-group { margin: 8px 0 12px 0; display: flex; gap: 15px; }
      .radio-group label { display: inline-flex; align-items: center; font-weight: normal; cursor: pointer; }
      .radio-group input { margin-right: 4px; }
      button { width: 100%; margin-top: 8px; font-weight: 500; }
      .loading { color: #5f6368; font-style: italic; font-size: 12px; text-align: center; margin-top: 20px; }
      .hidden { display: none; }
    </style>
  </head>
  <body>

    <div id="loader" class="loading">Loading Sheet headers...</div>

    <div id="main-panel" class="hidden">
      
      <div class="card">
        <h3>Use Variables - Static</h3>
        <p class="help-text">Places a clean data placeholder exactly where your cursor is blinking in the document.</p>
        
        <div class="form-group">
          <label for="static-dropdown">Select Column Header</label>
          <select id="static-dropdown" class="header-dropdown"></select>
        </div>
        <button class="action" onclick="insertStaticToken()">Insert Variable</button>
      </div>

      <div class="card">
        <h3>Use Variables - Conditional</h3>
        <p class="help-text">Control the dynamic layout. Wrap sections or target a specific table row to hide/show visually based on your data rules.</p>
        
        <div class="form-group">
          <label>Scope / Targeting</label>
          <div class="radio-group">
            <label><input type="radio" name="scope" value="block" checked> Paragraph/Section</label>
            <label><input type="radio" name="scope" value="row"> Table Row</label>
          </div>
        </div>

        <div class="form-group">
          <label for="cond-dropdown">If Variable</label>
          <select id="cond-dropdown" class="header-dropdown"></select>
        </div>

        <div class="form-group">
          <label for="cond-operator">Condition Rule</label>
          <select id="cond-operator">
            <option value="==">Equals (==)</option>
            <option value="!=">Does Not Equal (!=)</option>
            <option value=">=">Greater Than or Equal To (&gt;=)</option>
            <option value="<=">Less Than or Equal To (&lt;=)</option>
            <option value="contains">Contains text</option>
          </select>
        </div>

        <div class="form-group">
          <label for="cond-value">Value to Compare</label>
          <input type="text" id="cond-value" placeholder="e.g., 4 or Pass">
        </div>

        <button class="share" onclick="insertConditionalBlock()">Insert Conditional Block</button>
      </div>

    </div>

    <script>
      // Automatically pull dropdown variables when sidebar finishes loading
      window.onload = function() {
        google.script.run
          .withSuccessHandler(populateDropdowns)
          .withFailureHandler(handleLoadError)
          .getSheetHeaders();
      };

      function populateDropdowns(headers) {
        const dropdowns = document.querySelectorAll('.header-dropdown');
        
        if (!headers || headers.length === 0) {
          handleLoadError("No columns found in your Google Sheet.");
          return;
        }

        dropdowns.forEach(select => {
          select.innerHTML = ''; // Clear fallback states
          headers.forEach(header => {
            let option = document.createElement('option');
            option.value = header;
            option.textContent = header;
            select.appendChild(option);
          });
        });

        // Toggle UI view from loading state to ready state
        document.getElementById('loader').classList.add('hidden');
        document.getElementById('main-panel').classList.remove('hidden');
      }

      function handleLoadError(error) {
        const loader = document.getElementById('loader');
        loader.style.color = '#d93025';
        loader.textContent = "Error: " + (error.message || error);
      }

      // Action: Inserts standard structural token {Header} to match Sheet Engine perfectly
      function insertStaticToken() {
        const selectElement = document.getElementById('static-dropdown');
        const variable = selectElement.value;
        if (!variable) return;
        
        // CHANGED: Dropped from double braces to single braces
        const token = `{${variable}}`; 
        
        google.script.run
          .withSuccessHandler(function() { console.log("Static single-brace token injected."); })
          .withFailureHandler(function(err) { alert(err.message); })
          .injectTagAtCursor(token, '');
      }

      // Action: Injects conditional formatting blocks with single-brace variable rules
      function insertConditionalBlock() {
        const variable = document.getElementById('cond-dropdown').value;
        const operator = document.getElementById('cond-operator').value;
        const val = document.getElementById('cond-value').value;
        const scope = document.querySelector('input[name="scope"]:checked').value;
        
        if (!variable) return;

        if (scope === 'block') {
          // CHANGED: Using single braces for the variable inside the block context
          const openingTag = `<<If: {${variable}} ${operator} '${val}'>>`;
          const closingTag = `<<EndIf>>`;
          
          google.script.run
            .withSuccessHandler(function() { console.log("Conditional Block layout injected."); })
            .withFailureHandler(function(err) { alert(err.message); })
            .injectTagAtCursor(openingTag, closingTag);
        } else {
          // CHANGED: Using single braces for the row flag context
          const inlineRowTag = `<<RowIf: {${variable}} ${operator} '${val}'>>`;
          
          google.script.run
            .withSuccessHandler(function() { console.log("RowIf inline layout injected."); })
            .withFailureHandler(function(err) { alert(err.message); })
            .injectTagAtCursor(inlineRowTag, '');
        }
      }
    </script>
  </body>
</html>
